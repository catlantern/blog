name: 打包vue项目到githubPages
on:
  push:
    branches: [ master ]  
  pull_request:
    branches: [ master ]  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: 读取仓库内容
      uses: actions/checkout@v4

    - name: 安装nodeJs依赖
      uses: actions/setup-node@v3
      with:
        node-version: '22'  
        cache: 'npm'

    - name: 安装依赖
      run: npm ci  

    - name: 构建项目
      run: npm run build
      env:
        NODE_ENV: production

    - name: 部署到githubPages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: dist  